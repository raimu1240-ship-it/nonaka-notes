<!DOCTYPE html>
<html lang="ja" class="staticrypt-html">
<head>
<meta charset="utf-8" />
<title>秘 · Private Notes</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<meta http-equiv="cache-control" content="no-cache" />
<meta http-equiv="expires" content="0" />
<meta http-equiv="pragma" content="no-cache" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@500;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

<style>
  :root {
    --paper: #F1EBD7;          /* 生成り */
    --paper-deep: #E8E0C7;
    --ink: #1A1A1E;            /* 墨 */
    --ink-dim: #4A4641;
    --ink-faint: rgba(26, 26, 30, 0.38);
    --ink-ghost: rgba(26, 26, 30, 0.16);
    --hairline: rgba(26, 26, 30, 0.20);
    --grid-line: rgba(26, 26, 30, 0.055);
    --vermillion: #B83A2A;     /* 朱 */
    --vermillion-deep: #8A2618;
    --vermillion-soft: rgba(184, 58, 42, 0.85);
  }

  * { box-sizing: border-box; }

  html.staticrypt-html, body.staticrypt-body {
    margin: 0; padding: 0; height: 100%;
    background: var(--paper);
    color: var(--ink);
  }

  body.staticrypt-body {
    font-family: "Inter", "Hiragino Sans", -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
  }

  /* 紙のテクスチャ + 原稿用紙の升目 */
  body.staticrypt-body::before {
    content: ""; position: fixed; inset: 0;
    pointer-events: none; z-index: 1;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 36px 36px;
    background-position: 0 0;
    opacity: 0.85;
  }
  body.staticrypt-body::after {
    content: ""; position: fixed; inset: 0;
    pointer-events: none; z-index: 2;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='260' height='260'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.10  0 0 0 0 0.10  0 0 0 0 0.12  0 0 0 0.05 0'/></filter><rect width='260' height='260' filter='url(%23n)'/></svg>");
    opacity: 0.55;
    mix-blend-mode: multiply;
  }

  #staticrypt_content.staticrypt-content {
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    position: relative;
    background: transparent;
    font-family: inherit;
  }

  /* 上端バー */
  .nn-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 22px 36px;
    font-family: "Inter", sans-serif;
    font-size: 10.5px;
    font-weight: 500;
    letter-spacing: 0.34em;
    color: var(--ink-dim);
    position: relative;
    z-index: 5;
    text-transform: uppercase;
  }
  .nn-top > span {
    opacity: 0;
    animation: nn-fade 0.8s 0.7s ease both;
  }
  .nn-top::after {
    content: ""; position: absolute;
    left: 50%; right: 50%; bottom: 0;
    height: 1px; background: var(--hairline);
    animation: nn-line-x 1.1s 0.15s cubic-bezier(0.2, 0.7, 0.2, 1) both;
  }
  @keyframes nn-line-x {
    from { left: 50%; right: 50%; }
    to   { left: 36px; right: 36px; }
  }
  @keyframes nn-line-x-m {
    from { left: 50%; right: 50%; }
    to   { left: 20px; right: 20px; }
  }
  @keyframes nn-fade {
    from { opacity: 0; } to { opacity: 1; }
  }
  .nn-top .nn-mark {
    font-family: "Shippori Mincho B1", serif;
    font-weight: 700;
    color: var(--vermillion);
    font-size: 13px;
    letter-spacing: 0.18em;
    text-transform: none;
  }

  /* 下端バー */
  .nn-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 36px;
    font-family: "Inter", sans-serif;
    font-size: 9.5px;
    font-weight: 500;
    letter-spacing: 0.38em;
    color: var(--ink-faint);
    position: relative;
    z-index: 5;
    text-transform: uppercase;
  }
  .nn-bottom > span {
    opacity: 0;
    animation: nn-fade 0.8s 0.7s ease both;
  }
  .nn-bottom::before {
    content: ""; position: absolute;
    left: 50%; right: 50%; top: 0;
    height: 1px; background: var(--hairline);
    animation: nn-line-x 1.1s 0.15s cubic-bezier(0.2, 0.7, 0.2, 1) both;
  }

  /* 左マージン 縦書き「私／録」 */
  .nn-side-l {
    position: fixed;
    left: 30px;
    top: 50%;
    transform: translateY(-50%);
    writing-mode: vertical-rl;
    -webkit-writing-mode: vertical-rl;
    font-family: "Shippori Mincho B1", serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: 0.6em;
    color: var(--ink-ghost);
    z-index: 4;
    pointer-events: none;
    user-select: none;
    opacity: 0;
    animation: nn-side-in 1.2s 2.1s cubic-bezier(0.2, 0.7, 0.2, 1) both;
  }
  .nn-side-l .nn-bar {
    display: inline-block;
    width: 1px; height: 26px;
    background: var(--ink-ghost);
    margin-bottom: 14px;
  }
  /* 右マージン 縦書き「合言葉」 */
  .nn-side-r {
    position: fixed;
    right: 30px;
    top: 50%;
    transform: translateY(-50%);
    writing-mode: vertical-rl;
    -webkit-writing-mode: vertical-rl;
    font-family: "Shippori Mincho B1", serif;
    font-weight: 500;
    font-size: 12px;
    letter-spacing: 0.55em;
    color: var(--ink-ghost);
    z-index: 4;
    pointer-events: none;
    user-select: none;
    opacity: 0;
    animation: nn-side-in-r 1.2s 2.3s cubic-bezier(0.2, 0.7, 0.2, 1) both;
  }
  .nn-side-r .nn-bar {
    display: inline-block;
    width: 1px; height: 26px;
    background: var(--ink-ghost);
    margin-bottom: 14px;
  }
  @keyframes nn-side-in {
    from { opacity: 0; transform: translateY(-30%); }
    to   { opacity: 1; transform: translateY(-50%); }
  }
  @keyframes nn-side-in-r {
    from { opacity: 0; transform: translateY(-70%); }
    to   { opacity: 1; transform: translateY(-50%); }
  }

  /* メインステージ */
  .staticrypt-page {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px 56px;
    position: relative;
    z-index: 3;
  }

  /* タイトルブロック: 「秘」1文字 + 落款 */
  .nn-hero {
    position: relative;
    margin-bottom: 48px;
    --hm-px: 0px;
    --hm-py: 0px;
    transform: translate(var(--hm-px), var(--hm-py));
    transition: transform 0.7s cubic-bezier(0.2, 0.7, 0.2, 1);
  }

  /* 「秘」大書き */
  .nn-hi {
    font-family: "Shippori Mincho B1", serif;
    font-weight: 900;
    font-size: clamp(140px, 22vw, 240px);
    line-height: 0.9;
    color: var(--ink);
    text-align: center;
    letter-spacing: 0;
    display: block;
    opacity: 0;
    animation: nn-hi-in 1.4s 0.85s cubic-bezier(0.2, 0.7, 0.2, 1) both;
    text-shadow: 0 0 24px rgba(26, 26, 30, 0.04);
    user-select: none;
  }
  @keyframes nn-hi-in {
    from { opacity: 0; transform: translateY(20px) scale(1.06); filter: blur(8px); }
    60%  { opacity: 1; filter: blur(0); }
    to   { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
  }

  /* 落款 (朱の角印) */
  .nn-seal {
    position: absolute;
    top: 12%;
    right: -42px;
    width: 92px; height: 92px;
    background: var(--vermillion);
    color: var(--paper);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Shippori Mincho B1", serif;
    font-weight: 700;
    font-size: 38px;
    letter-spacing: 0;
    border-radius: 4px;
    box-shadow:
      inset 0 0 0 3px var(--vermillion),
      inset 0 0 0 4px rgba(241, 235, 215, 0.4),
      inset 0 0 0 5px var(--vermillion),
      0 6px 22px -8px rgba(184, 58, 42, 0.55);
    opacity: 0;
    transform: rotate(-12deg) scale(1.6);
    animation: nn-seal-stamp 0.7s 2.05s cubic-bezier(0.4, 1.7, 0.5, 1) both;
    z-index: 2;
    user-select: none;
  }
  /* 落款の和紙にじみ */
  .nn-seal::before {
    content: "";
    position: absolute;
    inset: -6px;
    border-radius: 6px;
    background: var(--vermillion);
    opacity: 0.18;
    filter: blur(4px);
    z-index: -1;
  }
  @keyframes nn-seal-stamp {
    0%   { opacity: 0; transform: rotate(-12deg) scale(1.6); }
    70%  { opacity: 1; transform: rotate(-12deg) scale(0.92); }
    100% { opacity: 1; transform: rotate(-12deg) scale(1); }
  }

  .nn-sub {
    font-family: "Inter", sans-serif;
    font-weight: 500;
    font-size: 10.5px;
    letter-spacing: 0.55em;
    color: var(--ink-dim);
    text-align: center;
    margin-top: 26px;
    text-indent: 0.55em;
    text-transform: uppercase;
    opacity: 0;
    animation: nn-fade 0.8s 2.3s ease both;
  }

  .nn-divider {
    width: 64px;
    height: 1px;
    background: var(--vermillion);
    margin: 28px auto 0;
    transform-origin: center;
    animation: nn-line 0.9s 2.5s cubic-bezier(0.2, 0.7, 0.2, 1) both;
  }
  @keyframes nn-line {
    from { transform: scaleX(0); }
    to   { transform: scaleX(1); }
  }

  .nn-instructions {
    font-family: "Shippori Mincho B1", serif;
    font-weight: 500;
    font-size: 13px;
    color: var(--ink-dim);
    letter-spacing: 0.18em;
    margin-top: 24px;
    text-indent: 0.18em;
    text-align: center;
    opacity: 0;
    animation: nn-fade 0.8s 2.7s ease both;
  }

  /* PIN 升目フォーム */
  .staticrypt-form {
    width: 100%;
    max-width: 360px;
    margin: 36px auto 0;
    position: relative;
    z-index: 3;
  }

  .nn-grid-label {
    font-family: "Inter", sans-serif;
    font-size: 9.5px;
    font-weight: 500;
    letter-spacing: 0.45em;
    color: var(--ink-faint);
    text-align: center;
    margin-bottom: 16px;
    text-transform: uppercase;
    opacity: 0;
    animation: nn-fade 0.7s 2.9s ease both;
  }
  .nn-grid-label .nn-jp {
    font-family: "Shippori Mincho B1", serif;
    color: var(--ink-dim);
    letter-spacing: 0.3em;
    text-transform: none;
  }
  .nn-grid-label .nn-mark {
    font-family: "Shippori Mincho B1", serif;
    color: var(--vermillion);
    margin: 0 8px;
  }

  /* 升目 4マス */
  .nn-cells {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 14px;
    position: relative;
    opacity: 0;
    animation: nn-fade 0.7s 3.05s ease both;
  }
  .nn-cell {
    aspect-ratio: 1 / 1;
    border: 1px solid var(--ink-faint);
    background: rgba(255, 255, 255, 0.22);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Shippori Mincho B1", serif;
    font-weight: 700;
    font-size: 44px;
    color: var(--ink);
    line-height: 1;
    transition:
      border-color 0.35s cubic-bezier(0.2, 0.7, 0.2, 1),
      background 0.35s ease,
      box-shadow 0.35s ease,
      transform 0.25s ease;
    position: relative;
    user-select: none;
    cursor: text;
  }
  .nn-cell.is-filled {
    border-color: var(--vermillion);
    background: rgba(184, 58, 42, 0.06);
    box-shadow: 0 0 0 1px var(--vermillion) inset;
  }
  .nn-cell.is-active {
    border-color: var(--ink);
    box-shadow: 0 0 0 1px var(--ink) inset, 0 6px 14px -8px rgba(26,26,30,0.18);
    transform: translateY(-1px);
  }
  /* caret */
  .nn-cell.is-active::after {
    content: "";
    position: absolute;
    bottom: 14%; left: 50%;
    width: 1.5px; height: 38%;
    background: var(--vermillion);
    transform: translateX(-50%);
    animation: nn-caret 0.9s ease infinite;
  }
  @keyframes nn-caret {
    0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; }
  }
  /* 入力済み文字: ink-bleed entrance */
  .nn-cell .nn-digit {
    display: inline-block;
    animation: nn-digit-in 0.45s cubic-bezier(0.2, 0.7, 0.2, 1) both;
  }
  @keyframes nn-digit-in {
    from { opacity: 0; transform: translateY(-10px) scale(0.85); filter: blur(3px); }
    to   { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
  }

  /* 実 input は透明・絶対配置 */
  .staticrypt-password-container { position: relative; }
  .staticrypt-form input[type="password"],
  .staticrypt-form input[type="text"] {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    opacity: 0;
    border: 0; padding: 0; margin: 0;
    color: transparent;
    background: transparent;
    -webkit-text-fill-color: transparent;
    caret-color: transparent;
    font-size: 16px;
    z-index: 4;
    cursor: text;
  }
  .staticrypt-form input:focus { outline: 0; }

  /* eye toggle は非表示 */
  .staticrypt-toggle-password-visibility {
    display: none;
  }

  .staticrypt-remember {
    display: flex !important;
    align-items: center;
    justify-content: center;
    margin: 24px 0 0;
    font-family: "Shippori Mincho B1", serif;
    font-size: 11.5px;
    font-weight: 500;
    color: var(--ink-dim);
    letter-spacing: 0.18em;
    cursor: pointer;
    user-select: none;
    opacity: 0;
    animation: nn-fade 0.7s 3.2s ease both;
  }
  .staticrypt-remember input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border: 1px solid var(--ink-faint);
    background: transparent;
    margin: 0 10px 0 0;
    cursor: pointer;
    transform: none;
    position: relative;
    border-radius: 0;
    transition: all 0.2s ease;
  }
  .staticrypt-remember input[type="checkbox"]:checked {
    background: var(--vermillion);
    border-color: var(--vermillion);
  }

  /* 解錠ボタン */
  .staticrypt-form .staticrypt-decrypt-button {
    width: 100%;
    margin-top: 34px;
    padding: 17px 0;
    background: var(--ink);
    background-image: linear-gradient(var(--vermillion), var(--vermillion));
    background-repeat: no-repeat;
    background-size: 100% 0%;
    background-position: 0 100%;
    border: 1px solid var(--ink);
    color: var(--paper);
    font-family: "Shippori Mincho B1", serif;
    font-weight: 700;
    font-size: 13.5px;
    letter-spacing: 0.62em;
    text-indent: 0.62em;
    text-transform: none;
    cursor: pointer;
    transition: background-size 0.45s cubic-bezier(0.2, 0.7, 0.2, 1),
                border-color 0.35s ease;
    opacity: 0;
    animation: nn-fade 0.7s 3.35s ease both;
  }
  .staticrypt-form .staticrypt-decrypt-button:hover,
  .staticrypt-form .staticrypt-decrypt-button:focus {
    background-size: 100% 100%;
    border-color: var(--vermillion);
    outline: 0;
  }

  /* シェイク + 朱メッセージ */
  .nn-shake { animation: nn-shake 0.42s cubic-bezier(0.36, 0.07, 0.19, 0.97); }
  @keyframes nn-shake {
    10%, 90% { transform: translateX(-2px); }
    20%, 80% { transform: translateX(4px); }
    30%, 50%, 70% { transform: translateX(-6px); }
    40%, 60% { transform: translateX(6px); }
  }
  .nn-err {
    font-family: "Shippori Mincho B1", serif;
    font-weight: 500;
    color: var(--vermillion);
    font-size: 12px;
    letter-spacing: 0.28em;
    text-indent: 0.28em;
    text-align: center;
    margin-top: 18px;
    animation: nn-fade-y 0.4s ease both;
  }
  @keyframes nn-fade-y {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* 解錠成功: 落款を画面中央に大きくドン */
  .nn-stamp-overlay {
    position: fixed; inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 99;
    background: rgba(241, 235, 215, 0);
    opacity: 0;
  }
  .nn-stamp-overlay.is-fire {
    animation: nn-stamp-bg 0.9s cubic-bezier(0.2, 0.7, 0.2, 1) both;
  }
  @keyframes nn-stamp-bg {
    0%   { opacity: 0; background: rgba(241, 235, 215, 0); }
    20%  { opacity: 1; background: rgba(241, 235, 215, 0.6); }
    100% { opacity: 0; background: rgba(241, 235, 215, 0); }
  }
  .nn-stamp-big {
    width: 260px; height: 260px;
    background: var(--vermillion);
    color: var(--paper);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Shippori Mincho B1", serif;
    font-weight: 800;
    font-size: 130px;
    border-radius: 6px;
    box-shadow:
      inset 0 0 0 6px var(--vermillion),
      inset 0 0 0 8px rgba(241, 235, 215, 0.45),
      inset 0 0 0 10px var(--vermillion),
      0 14px 50px -12px rgba(184, 58, 42, 0.55);
    transform: rotate(-8deg) scale(0);
  }
  .nn-stamp-overlay.is-fire .nn-stamp-big {
    animation: nn-stamp-drop 0.9s cubic-bezier(0.4, 1.6, 0.5, 1) both;
  }
  @keyframes nn-stamp-drop {
    0%   { transform: rotate(-30deg) scale(2.4); opacity: 0; }
    35%  { transform: rotate(-8deg) scale(0.92); opacity: 1; }
    65%  { transform: rotate(-8deg) scale(1); opacity: 1; }
    100% { transform: rotate(-8deg) scale(1.08); opacity: 0; }
  }

  /* 鈴 ミュートトグル */
  .nn-foot-right {
    display: inline-flex;
    align-items: center;
    gap: 18px;
  }
  .nn-sound-toggle {
    background: transparent;
    border: 0;
    cursor: pointer;
    font-family: "Shippori Mincho B1", serif;
    font-weight: 700;
    font-size: 14px;
    color: var(--ink-dim);
    padding: 2px 6px;
    position: relative;
    letter-spacing: 0;
    transition: color 0.25s ease;
    text-transform: none;
  }
  .nn-sound-toggle:hover { color: var(--vermillion); }
  .nn-sound-toggle.is-muted { color: var(--ink-faint); }
  .nn-sound-toggle.is-muted::after {
    content: ""; position: absolute;
    left: 2px; right: 2px; top: 50%;
    height: 1px; background: currentColor;
    transform: rotate(-14deg) translateY(-0.5px);
  }

  /* ローディング */
  #staticrypt_loading.staticrypt-spinner-container {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--paper);
  }
  .staticrypt-spinner {
    width: 26px; height: 26px;
    border: 1px solid var(--ink-ghost);
    border-top-color: var(--vermillion);
    border-radius: 50%;
    animation: spinner-border 0.9s linear infinite;
  }
  @keyframes spinner-border { to { transform: rotate(360deg); } }

  .hidden { display: none !important; }

  /* iOS zoom抑止 */
  @media screen and (-webkit-min-device-pixel-ratio: 0) {
    .staticrypt-form input[type="password"],
    .staticrypt-form input[type="text"] { font-size: 16px; }
  }

  /* モバイル */
  @media (max-width: 560px) {
    .nn-top, .nn-bottom { padding: 14px 18px; font-size: 9px; letter-spacing: 0.24em; }
    .nn-top::after, .nn-bottom::before { animation: nn-line-x-m 1.1s 0.15s cubic-bezier(0.2, 0.7, 0.2, 1) both; }
    .nn-side-l, .nn-side-r { display: none; }
    body.staticrypt-body::before { background-size: 28px 28px; }
    .nn-hero { margin-bottom: 36px; }
    .nn-hi { font-size: 140px; }
    .nn-seal { width: 70px; height: 70px; font-size: 28px; right: -10px; top: 8%; }
    .nn-cell { font-size: 36px; }
    .nn-cells { gap: 10px; max-width: 280px; margin-left: auto; margin-right: auto; }
    .staticrypt-page { padding: 40px 22px 48px; }
    .staticrypt-form .staticrypt-decrypt-button { letter-spacing: 0.5em; text-indent: 0.5em; }
  }
</style>
</head>
<body class="staticrypt-body">

<div id="staticrypt_loading" class="staticrypt-spinner-container">
  <div class="staticrypt-spinner"></div>
</div>

<div id="staticrypt_content" class="staticrypt-content hidden">

  <header class="nn-top">
    <span>PRIVATE — 私的記録</span>
    <span class="nn-mark">朱印</span>
    <span>MMXXVI</span>
  </header>

  <aside class="nn-side-l" aria-hidden="true">
    <span class="nn-bar"></span>私 録
  </aside>
  <aside class="nn-side-r" aria-hidden="true">
    <span class="nn-bar"></span>合言葉
  </aside>

  <main class="staticrypt-page">
    <div class="nn-hero">
      <span class="nn-hi">秘</span>
      <span class="nn-seal" aria-hidden="true">印</span>

  // ─── 和SE (Web Audio API procedural, inharmonic + reverb) ───────
  const nnAudio = (function () {
    let ctx = null;
    let reverb = null;
    let revGain = null;
    let masterGain = null;
    let keyCloseBuf = null;
    let muted = false;
    try { muted = localStorage.getItem("nn_mute") === "1"; } catch (e) {}

    function ensure() {
      if (ctx) return ctx;
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;
      ctx = new AC();

      // master
      masterGain = ctx.createGain();
      masterGain.gain.value = 1.0;
      masterGain.connect(ctx.destination);

      // 合成リバーブ IR (2s decay, stereo, exponential noise)
      const sr = ctx.sampleRate;
      const len = Math.floor(sr * 2.0);
      const ir = ctx.createBuffer(2, len, sr);
      for (let ch = 0; ch < 2; ch++) {
        const data = ir.getChannelData(ch);
        for (let i = 0; i < len; i++) {
          const env = Math.pow(1 - i / len, 2.6);
          data[i] = (Math.random() * 2 - 1) * env;
        }
      }
      reverb = ctx.createConvolver();
      reverb.buffer = ir;
      revGain = ctx.createGain();
      revGain.gain.value = 0.32;
      reverb.connect(revGain);
      revGain.connect(masterGain);

      // 解錠音 mp3 を decode
      try {
        const bin = atob(KEY_CLOSE_B64);
        const len = bin.length;
        const arr = new Uint8Array(len);
        for (let i = 0; i < len; i++) arr[i] = bin.charCodeAt(i);
        ctx.decodeAudioData(arr.buffer.slice(0), function (buf) { keyCloseBuf = buf; }, function (e) { console.warn("keyclose decode failed", e); });
      } catch (e) { console.warn("keyclose load failed", e); }

      return ctx;
    }
    function dest() { return masterGain; }
    function wet() { return reverb; }
    function resume() {
      ensure();
      if (ctx && ctx.state === "suspended") ctx.resume();
    }
    function setMuted(m) {
      muted = !!m;
      try { localStorage.setItem("nn_mute", muted ? "1" : "0"); } catch (e) {}
    }
    function isMuted() { return muted; }

    // 拍子木: 高域 noise burst + band-pass (PIN1桁入力ごと)
    function clack() {
      if (muted) return;
      const c = ensure(); if (!c) return;
      const t = c.currentTime;
      const len = Math.floor(c.sampleRate * 0.07);
      const buf = c.createBuffer(1, len, c.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < len; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (c.sampleRate * 0.010));
      }
      const src = c.createBufferSource(); src.buffer = buf;
      const bp = c.createBiquadFilter();
      bp.type = "bandpass"; bp.frequency.value = 2600; bp.Q.value = 5;
      const hp = c.createBiquadFilter();
      hp.type = "highpass"; hp.frequency.value = 800;
      const g = c.createGain(); g.gain.value = 0.42;
      const send = c.createGain(); send.gain.value = 0.15;
      src.connect(bp); bp.connect(hp); hp.connect(g); g.connect(dest());
      g.connect(send); send.connect(wet());
      src.start(t);
    }

    // 解錠音 (野中ご提供 mp3)
    function keyClose() {
      if (muted) return;
      const c = ensure(); if (!c) return;
      if (!keyCloseBuf) return; // decode 未完了時はスキップ
      const src = c.createBufferSource();
      src.buffer = keyCloseBuf;
      const g = c.createGain();
      g.gain.value = 0.85;
      const send = c.createGain();
      send.gain.value = 0.18;
      src.connect(g); g.connect(dest());
      g.connect(send); send.connect(wet());
      src.start(c.currentTime);
    }

    // 鈴 (釣鐘 inharmonic + 打撃トランジェント + 空気tail + reverb) — fallback / 未使用
    function bell() {
      if (muted) return;
      const c = ensure(); if (!c) return;
      const t = c.currentTime;

      // ① 打撃トランジェント (チン)
      const stLen = Math.floor(c.sampleRate * 0.022);
      const stBuf = c.createBuffer(1, stLen, c.sampleRate);
      const sd = stBuf.getChannelData(0);
      for (let i = 0; i < stLen; i++) {
        sd[i] = (Math.random()*2-1) * Math.exp(-i / (c.sampleRate * 0.003));
      }
      const stSrc = c.createBufferSource(); stSrc.buffer = stBuf;
      const stBP = c.createBiquadFilter();
      stBP.type = "bandpass"; stBP.frequency.value = 5400; stBP.Q.value = 2.4;
      const stHP = c.createBiquadFilter();
      stHP.type = "highpass"; stHP.frequency.value = 2800;
      const stG = c.createGain(); stG.gain.value = 0.22;
      const stSend = c.createGain(); stSend.gain.value = 0.45;
      stSrc.connect(stBP); stBP.connect(stHP); stHP.connect(stG);
      stG.connect(dest()); stG.connect(stSend); stSend.connect(wet());
      stSrc.start(t);

      // ② Body: 非整数倍音 (釣鐘の典型 inharmonic series)
      const fundamental = 1380;
      const ratios  = [1.00, 2.42, 4.85, 7.13, 9.67, 12.85];
      const amps    = [0.135, 0.095, 0.062, 0.040, 0.026, 0.017];
      const decays  = [1.70, 1.45, 1.25, 1.08, 0.92, 0.78];
      const detunes = [0,    +2,   -3,   +4,   -2,   +3]; // cents
      ratios.forEach((r, i) => {
        const o = c.createOscillator();
        o.type = "sine";
        o.frequency.value = fundamental * r;
        o.detune.value = detunes[i];

        // ゆらぎ LFO (chorus)
        const lfo = c.createOscillator();
        lfo.frequency.value = 3.8 + i * 0.55;
        const lfoG = c.createGain();
        lfoG.gain.value = 1.4 + i * 0.3;
        lfo.connect(lfoG); lfoG.connect(o.detune);

        const g = c.createGain();
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(amps[i], t + 0.003 + i * 0.0007);
        g.gain.exponentialRampToValueAtTime(0.00008, t + decays[i]);

        const send = c.createGain(); send.gain.value = 0.55;

        o.connect(g);
        g.connect(dest());
        g.connect(send); send.connect(wet());

        o.start(t); o.stop(t + decays[i] + 0.05);
        lfo.start(t); lfo.stop(t + decays[i]);
      });

      // ③ Air tail: 高域ノイズの長い shimmer
      const tailLen = Math.floor(c.sampleRate * 1.2);
      const tailBuf = c.createBuffer(1, tailLen, c.sampleRate);
      const td = tailBuf.getChannelData(0);
      for (let i = 0; i < tailLen; i++) {
        td[i] = (Math.random()*2-1) * Math.exp(-i / (c.sampleRate * 0.55));
      }
      const tailSrc = c.createBufferSource(); tailSrc.buffer = tailBuf;
      const tailHP = c.createBiquadFilter();
      tailHP.type = "highpass"; tailHP.frequency.value = 4200;
      const tailBP = c.createBiquadFilter();
      tailBP.type = "bandpass"; tailBP.frequency.value = 5400; tailBP.Q.value = 1.5;
      const tailG = c.createGain(); tailG.gain.value = 0.045;
      const tailSend = c.createGain(); tailSend.gain.value = 0.8;
      tailSrc.connect(tailHP); tailHP.connect(tailBP); tailBP.connect(tailG);
      tailG.connect(dest()); tailG.connect(tailSend); tailSend.connect(wet());
      tailSrc.start(t);
    }

    // 和太鼓 (バチ + 低域drop + ヘッド共鳴 + 皮ノイズ + reverb)
    function taiko() {
      if (muted) return;
      const c = ensure(); if (!c) return;
      const t = c.currentTime;

      // バチ打撃 (mid-high transient)
      const aLen = Math.floor(c.sampleRate * 0.022);
      const aBuf = c.createBuffer(1, aLen, c.sampleRate);
      const ad = aBuf.getChannelData(0);
      for (let i = 0; i < aLen; i++) {
        ad[i] = (Math.random()*2-1) * Math.exp(-i / (c.sampleRate * 0.004));
      }
      const aSrc = c.createBufferSource(); aSrc.buffer = aBuf;
      const aBP = c.createBiquadFilter();
      aBP.type = "bandpass"; aBP.frequency.value = 1900; aBP.Q.value = 1.4;
      const aG = c.createGain(); aG.gain.value = 0.46;
      const aSend = c.createGain(); aSend.gain.value = 0.25;
      aSrc.connect(aBP); aBP.connect(aG);
      aG.connect(dest()); aG.connect(aSend); aSend.connect(wet());
      aSrc.start(t);

      // 低域 fundamental (胴鳴り)
      const o1 = c.createOscillator();
      o1.type = "sine";
      o1.frequency.setValueAtTime(178, t);
      o1.frequency.exponentialRampToValueAtTime(42, t + 0.42);
      const g1 = c.createGain();
      g1.gain.setValueAtTime(0, t);
      g1.gain.linearRampToValueAtTime(0.78, t + 0.007);
      g1.gain.exponentialRampToValueAtTime(0.0008, t + 0.7);
      const s1 = c.createGain(); s1.gain.value = 0.40;
      o1.connect(g1); g1.connect(dest()); g1.connect(s1); s1.connect(wet());
      o1.start(t); o1.stop(t + 0.75);

      // 中域 ヘッド共鳴
      const o2 = c.createOscillator();
      o2.type = "sine";
      o2.frequency.setValueAtTime(360, t);
      o2.frequency.exponentialRampToValueAtTime(180, t + 0.25);
      const g2 = c.createGain();
      g2.gain.setValueAtTime(0, t);
      g2.gain.linearRampToValueAtTime(0.20, t + 0.005);
      g2.gain.exponentialRampToValueAtTime(0.0008, t + 0.32);
      const s2 = c.createGain(); s2.gain.value = 0.35;
      o2.connect(g2); g2.connect(dest()); g2.connect(s2); s2.connect(wet());
      o2.start(t); o2.stop(t + 0.36);

      // 皮ノイズ (skin texture)
      const nLen = Math.floor(c.sampleRate * 0.22);
      const nBuf = c.createBuffer(1, nLen, c.sampleRate);
      const nd = nBuf.getChannelData(0);
      for (let i = 0; i < nLen; i++) {
        nd[i] = (Math.random()*2-1) * Math.exp(-i / (c.sampleRate * 0.045));
      }
      const nSrc = c.createBufferSource(); nSrc.buffer = nBuf;
      const nLP = c.createBiquadFilter();
      nLP.type = "lowpass"; nLP.frequency.value = 550;
      const nG = c.createGain(); nG.gain.value = 0.34;
      const nS = c.createGain(); nS.gain.value = 0.50;
      nSrc.connect(nLP); nLP.connect(nG);
      nG.connect(dest()); nG.connect(nS); nS.connect(wet());
      nSrc.start(t);
    }

    // 失敗: 低い濁り音
    function fail() {
      if (muted) return;
      const c = ensure(); if (!c) return;
      const t = c.currentTime;
      const o = c.createOscillator();
      o.type = "sawtooth";
      o.frequency.setValueAtTime(210, t);
      o.frequency.exponentialRampToValueAtTime(82, t + 0.3);
      const g = c.createGain();
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.20, t + 0.008);
      g.gain.exponentialRampToValueAtTime(0.0006, t + 0.42);
      const lp = c.createBiquadFilter();
      lp.type = "lowpass"; lp.frequency.value = 620; lp.Q.value = 0.8;
      const send = c.createGain(); send.gain.value = 0.25;
      o.connect(lp); lp.connect(g);
      g.connect(dest()); g.connect(send); send.connect(wet());
      o.start(t); o.stop(t + 0.48);
    }

    return { clack, bell, keyClose, taiko, fail, resume, ensure, setMuted, isMuted };
  })();

  // 初回ジェスチャでAudioContext起動
  function nnUnlockAudio() {
    nnAudio.resume();
  }
  ["pointerdown", "keydown", "touchstart"].forEach(ev => {
    window.addEventListener(ev, nnUnlockAudio, { once: true, passive: true });
  });

  // ミュートトグル
  const soundToggleEl = document.getElementById("nn-sound-toggle");
  function syncMuteUI() {
    if (!soundToggleEl) return;
    soundToggleEl.classList.toggle("is-muted", nnAudio.isMuted());
    soundToggleEl.setAttribute("title", nnAudio.isMuted() ? "音 オフ" : "音 オン");
  }
  syncMuteUI();
  if (soundToggleEl) {
    soundToggleEl.addEventListener("click", () => {
      nnAudio.setMuted(!nnAudio.isMuted());
      syncMuteUI();
      if (!nnAudio.isMuted()) nnAudio.clack();
    });
  }

  function renderCells() {
    const v = inputEl.value || "";
    cells.forEach((cell, i) => {
      const ch = v[i] || "";
      cell.classList.toggle("is-filled", !!ch);
      cell.classList.remove("is-active");
      if (ch) {
        if (cell.firstChild && cell.firstChild.textContent === ch) return;
        cell.innerHTML = '<span class="nn-digit">' + ch.replace(/[<>&]/g, "") + "</span>";
      } else {
        cell.textContent = "";
      }
    });
    const idx = Math.min(v.length, cells.length - 1);
    if (cells[idx] && document.activeElement === inputEl) {
      cells[idx].classList.add("is-active");
    }
  }

  function focusInput() {
    inputEl.focus();
    renderCells();
  }

  window.onload = async function () {
    const { isSuccessful } = await staticrypt.handleDecryptOnLoad();
    if (!isSuccessful) {
      document.getElementById("staticrypt_loading").classList.add("hidden");
      document.getElementById("staticrypt_content").classList.remove("hidden");
      setTimeout(focusInput, 100);
      if (isRememberEnabled) {
        document.getElementById("staticrypt-remember-label").classList.remove("hidden");
      }
      attachParallax();
    }
  };

  let lastInputLen = 0;
  inputEl.addEventListener("input", () => {
    const v = inputEl.value || "";
    if (v.length > lastInputLen) {
      nnAudio.clack();
    }
    lastInputLen = v.length;
    renderCells();
  });
  inputEl.addEventListener("focus", renderCells);
  inputEl.addEventListener("blur", () => cells.forEach(c => c.classList.remove("is-active")));
  cellsEl && cellsEl.addEventListener("click", focusInput);

  // パララックス: 「秘」+ 落款
  function attachParallax() {
    if (window.matchMedia("(hover: none)").matches) return;
    const hero = document.querySelector(".nn-hero");
    if (!hero) return;
    let raf = null, tx = 0, ty = 0, cx = 0, cy = 0;
    function onMove(e) {
      const rx = (e.clientX / window.innerWidth - 0.5);
      const ry = (e.clientY / window.innerHeight - 0.5);
      tx = rx * 16; ty = ry * 12;
      if (!raf) raf = requestAnimationFrame(loop);
    }
    function loop() {
      cx += (tx - cx) * 0.08;
      cy += (ty - cy) * 0.08;
      hero.style.setProperty("--hm-px", cx.toFixed(2) + "px");
      hero.style.setProperty("--hm-py", cy.toFixed(2) + "px");
      if (Math.abs(tx - cx) > 0.05 || Math.abs(ty - cy) > 0.05) {
        raf = requestAnimationFrame(loop);
      } else {
        raf = null;
      }
    }
    window.addEventListener("mousemove", onMove, { passive: true });
  }

  // 送信
  document.getElementById("staticrypt-form").addEventListener("submit", async function (e) {
    e.preventDefault();
    const password = inputEl.value,
      isRememberChecked = document.getElementById("staticrypt-remember").checked;

    // 解錠ボタン押下 → 提供mp3 (鍵を閉じる音)
    nnAudio.keyClose();

    const { isSuccessful } = await staticrypt.handleDecryptionOfPage(password, isRememberChecked);

    if (isSuccessful) {
      const ov = document.getElementById("nn-stamp-overlay");
      if (ov) ov.classList.add("is-fire");
    } else {
      const form = document.getElementById("staticrypt-form");
      form.classList.remove("nn-shake");
      void form.offsetWidth;
      form.classList.add("nn-shake");

      const old = document.querySelector(".nn-err");
      if (old) old.remove();
      const errLabel = document.createElement("div");
      errLabel.className = "nn-err";
      errLabel.textContent = templateError;
      form.appendChild(errLabel);

      inputEl.value = "";
      lastInputLen = 0;
      renderCells();
      focusInput();
    }
  });
</script>
</body>
